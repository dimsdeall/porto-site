image: node:latest

.deploy: &deploy
  - npm install -g firebase-tools
  - echo $FIREBASE_ACCOUNT
  - echo $FIREBASE_TARGET_HOSTING
  - echo "$FIREBASE_TARGET_HOSTING"
  - cp $FIREBASE_ACCOUNT "$PWD/service-account.json"
  # - pwd
  # - firebase logout
  # - ls -a
  # - firebase use $FIREBASE_PROJECT_ID --token $FIREBASE_TOKEN
  - export GOOGLE_APPLICATION_CREDENTIALS="$PWD/service-account.json"
  # - export GOOGLE_APPLICATION_CREDENTIALS="$FIREBASE_SERVICE_ACCOUNT"
  # - printenv
  - yarn
  - yarn build

# cache:
#   paths:
#     - node_modules/

stages:
  - deploy

# staging:
#   stage: deploy
#   before_script:
#     - *deploy
#   only:
#     - master
#   script:
#     - firebase deploy -m "Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --only hosting:<YOUR TARGET NAME> --non-interactive --token $FIREBASE_TOKEN

production:
  stage: deploy
  before_script:
    - *deploy
  only:
    - main
  # when: manual
  allow_failure: false
  script:
    - firebase deploy -m "Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --only hosting:$FIREBASE_TARGET_HOSTING